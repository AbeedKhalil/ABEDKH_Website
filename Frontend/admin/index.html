<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex,nofollow">
    <title>Admin · Portfolio</title>
    <link rel="icon" type="image/jpeg" href="../assets/profile.jpg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="admin.css">
</head>
<body class="admin-body">

<header class="admin-header">
    <div class="admin-header-inner">
        <a href="/" class="admin-brand">
            <img src="../assets/profile.jpg" alt="" class="brand-avatar">
            <span>Portfolio Admin</span>
        </a>
        <nav class="admin-nav" id="admin-nav" hidden>
            <a href="#/projects" data-route="projects">Projects</a>
            <a href="#/account" data-route="account">Account</a>
            <a href="/" target="_blank" rel="noopener">View site ↗</a>
            <button type="button" class="btn btn-outline btn-sm" id="logout-btn">Logout</button>
        </nav>
    </div>
</header>

<main id="admin-main" class="admin-main">
    <div id="view" aria-live="polite"></div>
</main>

<div id="toast" class="toast" role="status" aria-live="polite" hidden></div>

<script src="admin.js"></script>
</body>
</html>
